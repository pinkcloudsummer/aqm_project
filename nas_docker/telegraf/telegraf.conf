[agent]
  interval = "10s"
  round_interval = true
  flush_interval = "10s"

# Subscribe to all air quality topics from Mosquitto.
# Each topic publishes a single float value, e.g. home/air/co2 = "423"
# The full topic path is stored as the "sensor" tag so you can filter by it in InfluxDB.
[[inputs.mqtt_consumer]]
  servers = ["tcp://airquality_mosquitto:1883"]
  topics  = ["home/air/#"]
  data_format = "value"
  data_type   = "float"
  topic_tag   = "sensor"
  name_override = "air_quality"

[[outputs.influxdb_v2]]
  urls         = ["http://airquality_influxdb:8086"]
  token        = "airqualitysensing101"   # must match docker-compose.yml
  organization = "home"
  bucket       = "airquality"
