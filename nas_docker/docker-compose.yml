version: '3.8'

# Air Quality Monitor Stack
# Place this entire folder on your NAS and point Container Manager at it.
# All three services share an internal network — they reference each other by container name.

services:

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: airquality_mosquitto
    ports:
      - "1883:1883"       # MQTT — ESP32 publishes here
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: airquality_influxdb
    ports:
      - "8086:8086"       # InfluxDB UI — open http://NAS_IP:8086 in browser
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: changeme123        # change this
      DOCKER_INFLUXDB_INIT_ORG: home
      DOCKER_INFLUXDB_INIT_BUCKET: airquality
      DOCKER_INFLUXDB_INIT_RETENTION: "0"               # 0 = keep forever
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: airqualitysensing101
    restart: unless-stopped

  telegraf:
    image: telegraf:latest
    container_name: airquality_telegraf
    user: "0:0"
    entrypoint: ["/bin/sh", "-c", "printf '%s' \"$$TELEGRAF_CONFIG\" > /tmp/telegraf.conf && telegraf --config /tmp/telegraf.conf"]
    environment:
      TELEGRAF_CONFIG: |
        [agent]
          interval = "10s"
          round_interval = true
          flush_interval = "10s"

        [[inputs.mqtt_consumer]]
          servers = ["tcp://airquality_mosquitto:1883"]
          topics  = ["home/air/#"]
          data_format = "value"
          data_type   = "float"
          topic_tag   = "sensor"
          name_override = "air_quality"

        [[outputs.influxdb_v2]]
          urls         = ["http://airquality_influxdb:8086"]
          token        = "airqualitysensing101"
          organization = "home"
          bucket       = "airquality"
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: airquality_grafana
    user: "0:0"
    ports:
      - "3000:3000"       # Grafana UI — open http://NAS_IP:3000 in browser
    volumes:
      - ./grafana/data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: changeme123
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - influxdb
    restart: unless-stopped

  dashboard:
    # Image is built and pushed to GHCR automatically by GitHub Actions.
    # Replace OWNER/REPO with your actual GitHub username and repo name,
    # e.g.  ghcr.io/pinkcloudsummer/my-air-quality-repo:latest
    image: ghcr.io/pinkcloudsummer/REPO_NAME:latest
    container_name: airquality_dashboard
    ports:
      - "3001:3001"       # Dashboard SPA — open http://NAS_IP:3001 in browser
    environment:
      INFLUXDB_URL: http://airquality_influxdb:8086
      INFLUXDB_TOKEN: airqualitysensing101
      INFLUXDB_ORG: home
      INFLUXDB_BUCKET: airquality
      TZ: America/New_York
    depends_on:
      - influxdb
    restart: unless-stopped

  # Watchtower polls GHCR every 5 minutes and restarts any container whose
  # image has been updated — keeps the dashboard in sync with your GitHub pushes.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: airquality_watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount Docker credentials so Watchtower can pull from private GHCR packages.
      # Run  docker login ghcr.io -u pinkcloudsummer -p YOUR_PAT  on the NAS first,
      # then this file (~/.docker/config.json) will contain the saved token.
      - $HOME/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: "300"   # check every 5 minutes
      WATCHTOWER_CLEANUP: "true"        # delete old images after update
      WATCHTOWER_LABEL_ENABLE: "false"  # watch ALL containers (set true to opt-in per container)
    restart: unless-stopped

networks:
  default:
    name: airquality_network
