name: Build and Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"

env:
  IMAGE: ghcr.io/${{ github.repository }}/dashboard

jobs:
  # ── Job 1: runs on GitHub's servers ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # needed to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # automatic, no setup needed

      - name: Build and push dashboard image
        uses: docker/build-push-action@v4
        with:
          context: ./dashboard
          push: true
          tags: ${{ env.IMAGE }}:latest

  # ── Job 2: runs on your NAS ───────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: [self-hosted, nas]

    steps:
      - uses: actions/checkout@v4

      - name: Pull new image
        run: docker pull ${{ env.IMAGE }}:latest

      - name: Restart dashboard container
        run: docker compose -f airquality/docker-compose.yml up -d --no-deps dashboard
